<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Route Sheet Extractor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f3f0;
  --surface:#ffffff;
  --surface-2:#f9f8f6;
  --border:#e2e0da;
  --border-mid:#c8c5bc;
  --ink:#1a1917;
  --ink-2:#3d3b37;
  --ink-3:#6b6860;
  --ink-4:#9b9890;
  --radius:12px;
  --radius-sm:8px;
  --radius-xs:4px;
  --font:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-mono:'DM Mono',ui-monospace,monospace;
  --green:#1D9E75;
  --red:#c0392b;
  --amber-bg:#FAEEDA;
  --amber-text:#633806;
  --coral-bg:#FAECE7;
  --coral-text:#4A1B0C;
}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:32px 16px 64px;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
.wrap{width:100%;max-width:560px}

.hdr{text-align:center;margin-bottom:20px}
.hdr-title{font-size:22px;font-weight:700;letter-spacing:-.03em;color:var(--ink);margin-bottom:0}
.hdr-title span{border-bottom:2px solid var(--ink)}
.vbadge{font-size:10px;font-weight:700;background:var(--border);color:var(--ink);padding:2px 7px;border-radius:var(--radius-xs);font-family:var(--font-mono);display:inline-block;margin-bottom:10px;letter-spacing:.06em}

.name-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.name-box label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-4);margin-bottom:7px}
.name-box input{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 13px;font-family:var(--font);font-size:15px;font-weight:500;color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none}
.name-box input:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(26,25,23,.08)}
.name-box input::placeholder{color:var(--ink-4)}

.drop-zone{background:var(--surface);border:1.5px dashed var(--border-mid);border-radius:var(--radius);padding:40px 24px;text-align:center;cursor:pointer;transition:all .2s ease;margin-bottom:14px}
.drop-zone.drag-over{border-color:var(--ink);background:var(--surface-2)}
.drop-icon{margin-bottom:12px;display:block}
.drop-zone h2{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:4px}
.drop-zone p{color:var(--ink-4);font-size:13px}
.file-label{display:block;margin-top:16px}
.file-label input[type="file"]{display:none}
.browse-btn{display:inline-block;background:var(--ink);color:#fff;font-family:var(--font);font-size:13px;font-weight:600;padding:10px 28px;border-radius:100px;cursor:pointer;letter-spacing:.02em;transition:opacity .15s}
.browse-btn:active{opacity:.75}

.status-bar{display:none;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:14px;font-size:13px;font-weight:500;color:var(--ink-3)}
.status-bar.visible{display:flex}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--ink-4)}
.status-dot.spin{background:var(--ink-3);animation:pulse 1s infinite}
.status-dot.ok{background:var(--green)}
.status-dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

.cci-bar{display:none;background:var(--ink);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:10px;align-items:flex-start;gap:10px;flex-wrap:wrap}
.cci-bar.visible{display:flex}
.cci-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:rgba(255,255,255,.45);white-space:nowrap;padding-top:1px;flex-shrink:0}
.cci-list{display:flex;flex-wrap:wrap;gap:6px 14px;font-size:12px;font-weight:500;font-family:var(--font-mono);line-height:1.4}
.cci-entry{display:flex;align-items:center;gap:5px;white-space:nowrap}
.cci-name{color:#fff;font-weight:600}
.cci-in{color:rgba(255,255,255,.7);font-size:11px;font-weight:800}
.cci-out{color:rgba(255,255,255,.4);font-size:11px;font-weight:800}

.tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);margin-bottom:12px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 14px;font-size:13px;font-weight:400;color:var(--ink-3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;user-select:none;font-family:var(--font);background:none;border-top:none;border-left:none;border-right:none;outline:none;transition:color .15s}
.tab:hover{color:var(--ink-2)}
.tab.active{color:var(--ink);font-weight:600;border-bottom-color:var(--ink)}
.tab-ct{display:inline-block;background:var(--border);border-radius:10px;font-size:10px;padding:1px 5px;margin-left:3px;color:var(--ink-3);transition:all .15s}
.tab.active .tab-ct{background:var(--ink);color:#fff}

.results-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:0 2px}
.results-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-4)}
.results-count{background:var(--ink);color:#fff;font-size:11px;font-weight:600;padding:3px 12px;border-radius:100px}

/* FLAVIN CARDS */
.jobs{display:flex;flex-direction:column;gap:8px}
.job-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;animation:slideIn .25s ease forwards;opacity:0;transform:translateY(6px)}
.job-card:nth-child(1){animation-delay:.03s}
.job-card:nth-child(2){animation-delay:.07s}
.job-card:nth-child(3){animation-delay:.11s}
.job-card:nth-child(4){animation-delay:.15s}
.job-card:nth-child(n+5){animation-delay:.18s}
@keyframes slideIn{to{opacity:1;transform:translateY(0)}}
.card-head{padding:12px 14px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.loc{font-size:14px;font-weight:700;color:var(--ink);line-height:1.3;flex:1;letter-spacing:-.01em}
.tbadge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:5px;white-space:nowrap;flex-shrink:0;text-transform:uppercase;letter-spacing:.04em}
.t-major{background:var(--ink);color:#fff}
.t-mrp{background:var(--border);color:var(--ink-2)}
.t-new{background:#4a4945;color:#fff}
.card-primary{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.pf{padding:10px 14px;display:flex;flex-direction:column;gap:3px}
.pf:first-child{border-right:1px solid var(--border)}
.fl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-4)}
.fv{font-size:13px;font-weight:700;color:var(--ink);font-family:var(--font-mono);line-height:1.3;word-break:break-all}
.fv.pl{font-family:var(--font);font-size:13px;font-weight:600}
.fv.mt{color:var(--border-mid);font-family:var(--font);font-weight:400;font-size:13px}
.card-foreman{padding:9px 14px;border-bottom:1px solid var(--border)}
.co-tag{font-size:10px;font-weight:700;color:var(--ink-4);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.fm-name{font-size:13px;font-weight:600;color:var(--ink)}
.fm-name.mt{color:var(--ink-4);font-weight:400}
.card-fields{display:grid;grid-template-columns:1fr 1fr;padding:10px 14px;gap:10px 14px}
.cf{display:flex;flex-direction:column;gap:3px}
.cfv{font-size:12px;font-weight:600;color:var(--ink);word-break:break-word;line-height:1.4;font-family:var(--font-mono)}
.cfv.pl{font-family:var(--font)}
.cfv.mt{color:var(--border-mid);font-family:var(--font);font-weight:400}
.badges{display:flex;flex-wrap:wrap;gap:4px;padding:7px 14px;border-top:1px solid var(--border)}
.b-cont{background:var(--amber-bg);color:var(--amber-text);font-size:11px;font-weight:600;padding:2px 8px;border-radius:var(--radius-xs)}
.b-hp{background:var(--coral-bg);color:var(--coral-text);font-size:11px;font-weight:600;padding:2px 8px;border-radius:var(--radius-xs)}

/* CONTRACTOR LIST */
.list-jobs{display:flex;flex-direction:column;gap:6px}
.list-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;animation:slideIn .25s ease forwards;opacity:0;transform:translateY(6px)}
.list-item:nth-child(1){animation-delay:.03s}
.list-item:nth-child(2){animation-delay:.06s}
.list-item:nth-child(3){animation-delay:.09s}
.list-item:nth-child(4){animation-delay:.12s}
.list-item:nth-child(n+5){animation-delay:.14s}
.list-loc{font-size:14px;font-weight:700;color:var(--ink);line-height:1.3;margin-bottom:4px;letter-spacing:-.01em}
.list-work{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px}
.list-meta{display:flex;flex-wrap:wrap;gap:3px 16px}
.lm{font-size:11px;color:var(--ink-3);display:flex;gap:4px;align-items:center}
.lm b{font-weight:700;color:var(--ink);font-family:var(--font-mono);font-size:11px}
.list-badges{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap}

.no-jobs{padding:32px;text-align:center;color:var(--ink-4);font-size:14px}
.action-row{margin-bottom:20px;margin-top:4px}
.reset-btn{width:100%;border-radius:var(--radius);padding:14px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;-webkit-appearance:none;transition:opacity .15s;background:var(--surface);border:1px solid var(--border);color:var(--ink-3)}
.reset-btn:active{opacity:.7}
</style>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <div class="vbadge">v3.0</div>
    <h1 class="hdr-title">Locations for <span id="headingName">Jeremiah Flavin</span></h1>
  </div>

  <div id="uploadSection">
    <div class="name-box">
      <label for="inspectorInput">Inspector name</label>
      <input type="text" id="inspectorInput" value="Jeremiah Flavin" placeholder="Enter inspector name…" autocomplete="off" spellcheck="false">
    </div>
    <div class="drop-zone" id="dropZone">
      <span class="drop-icon">
        <svg width="48" height="48" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="8" y="4" width="28" height="36" rx="3" fill="#e2e0da" stroke="#1a1917" stroke-width="2"/>
          <rect x="15" y="1" width="14" height="7" rx="2" fill="#1a1917" stroke="#1a1917" stroke-width="2"/>
          <line x1="14" y1="17" x2="30" y2="17" stroke="#1a1917" stroke-width="2" stroke-linecap="round"/>
          <line x1="14" y1="23" x2="30" y2="23" stroke="#1a1917" stroke-width="2" stroke-linecap="round"/>
          <line x1="14" y1="29" x2="24" y2="29" stroke="#1a1917" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </span>
      <h2>Drop route sheet here</h2>
      <p>Tap to browse · .xlsx files only</p>
      <label class="file-label">
        <input type="file" id="fileInput" accept=".xlsx,.xls">
        <span class="browse-btn">Browse file</span>
      </label>
    </div>
    <div class="status-bar" id="statusBar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText"></span>
    </div>
  </div>

  <div id="resultsSection" style="display:none">
    <div class="cci-bar" id="cciBar">
      <span class="cci-label">CCI</span>
      <div class="cci-list" id="cciList"></div>
    </div>
    <div class="tabs" id="tabBar"></div>
    <div class="results-hdr" id="resultsHdr" style="display:none">
      <span class="results-label">Your assignments</span>
      <span class="results-count" id="resultsCount"></span>
    </div>
    <div id="jobsContainer"></div>
    <div class="action-row">
      <button class="reset-btn" id="resetBtn">↩ Load another file</button>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
(function(){

var DEFAULT_NAME = 'Jeremiah Flavin';
var allData = {};

var inspectorInput = document.getElementById('inspectorInput');
var headingName    = document.getElementById('headingName');
var dropZone       = document.getElementById('dropZone');
var fileInput      = document.getElementById('fileInput');
var statusBar      = document.getElementById('statusBar');
var statusDot      = document.getElementById('statusDot');
var statusText     = document.getElementById('statusText');
var uploadSection  = document.getElementById('uploadSection');
var resultsSection = document.getElementById('resultsSection');
var cciBar         = document.getElementById('cciBar');
var cciList        = document.getElementById('cciList');
var tabBar         = document.getElementById('tabBar');
var resultsHdr     = document.getElementById('resultsHdr');
var resultsCount   = document.getElementById('resultsCount');
var jobsContainer  = document.getElementById('jobsContainer');
var resetBtn       = document.getElementById('resetBtn');

inspectorInput.addEventListener('input', function(){
  headingName.textContent = this.value.trim() || DEFAULT_NAME;
});
dropZone.addEventListener('dragover', function(e){ e.preventDefault(); e.stopPropagation(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', function(){ dropZone.classList.remove('drag-over'); });
dropZone.addEventListener('drop', function(e){
  e.preventDefault(); e.stopPropagation();
  dropZone.classList.remove('drag-over');
  var f = e.dataTransfer.files[0];
  if(f) processFile(f);
});
fileInput.addEventListener('change', function(){ if(this.files && this.files[0]) processFile(this.files[0]); });
resetBtn.addEventListener('click', function(){ location.reload(); });

function setStatus(type, msg){
  statusBar.classList.add('visible');
  statusDot.className = 'status-dot ' + type;
  statusText.textContent = msg;
}

function fmtName(n){
  if(!n) return '';
  var p = n.trim().split(/\s+/);
  if(p.length === 1) return p[0];
  return p[0].charAt(0).toUpperCase() + '. ' + p[p.length-1];
}

function parseCCIs(wb){
  var ss = wb.Sheets['Summary']; if(!ss) return [];
  var rows = XLSX.utils.sheet_to_json(ss, {header:1, defval:null});
  var hi = -1;
  for(var i = 0; i < rows.length; i++){
    if(rows[i][2] && String(rows[i][2]).toLowerCase().indexOf('cci') !== -1 &&
       rows[i][3] && String(rows[i][3]).toLowerCase().indexOf('in') !== -1){ hi = i; break; }
  }
  if(hi === -1) return [];
  var out = [];
  for(var j = hi+1; j < rows.length; j++){
    var nm = rows[j][2], st = rows[j][3];
    if(!nm || !String(nm).trim()) break;
    out.push({name: String(nm).trim(), status: String(st||'').trim()});
  }
  return out;
}

function processFile(file){
  var NAME = inspectorInput.value.trim() || DEFAULT_NAME;
  headingName.textContent = NAME;
  setStatus('spin', 'Reading file…');
  dropZone.style.display = 'none';

  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var wb = XLSX.read(new Uint8Array(e.target.result), {type:'array', cellDates:true});
      var ccis = parseCCIs(wb);
      var sheetJobs = {};
      var headers = null;
      var SHEETS = ['CAC','Donofrio','EJ','Gianfia','MFM'];

      for(var si = 0; si < wb.SheetNames.length; si++){
        var sn = wb.SheetNames[si];
        if(sn === 'Summary' || sn === 'Raw Data') continue;
        var ws = wb.Sheets[sn];
        var rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
        if(rows.length < 3) continue;
        var company = (rows[1] && rows[1][4]) ? String(rows[1][4]).trim() : sn;
        var hrow = -1, ciIdx = -1;
        for(var i = 0; i < Math.min(rows.length, 8); i++){
          var idx = rows[i].indexOf('Covering Inspector');
          if(idx !== -1){ hrow = i; ciIdx = idx; break; }
        }
        if(hrow === -1) continue;
        if(!headers) headers = rows[hrow];
        var lastForeman = '';
        var jobs = [];
        var seen = {};
        for(var r = hrow+1; r < rows.length; r++){
          var row = rows[r];
          if(!row || row.every(function(c){ return c === null || c === ''; })) continue;
          var fval = row[0];
          if(fval && String(fval).trim() !== '') lastForeman = String(fval).trim();
          var insp = row[ciIdx];
          if(insp && String(insp).trim() === NAME){
            if(!row[0] || String(row[0]).trim() === ''){ row = row.slice(); row[0] = lastForeman; }
            var wdI = headers.indexOf('Work Description');
            var wd = row[wdI] ? String(row[wdI]).trim() : '';
            var key = String(row[headers.indexOf('Ticket #')]||'') + '|' + String(row[headers.indexOf('Location')]||'') + '|' + wd;
            if(!seen[key]){
              seen[key] = true;
              var jr = row.slice();
              jr._co = company;
              jobs.push(jr);
            }
          }
        }
        sheetJobs[sn] = {jobs: jobs, company: company};
      }

      if(!headers) throw new Error('Could not find column headers.');
      var myJobs = [];
      SHEETS.forEach(function(sn){ if(sheetJobs[sn]) myJobs = myJobs.concat(sheetJobs[sn].jobs); });
      allData = {headers: headers, flavin: myJobs, sheets: sheetJobs, ccis: ccis, contractorSheets: SHEETS, name: NAME};
      renderResults();
    } catch(err){
      setStatus('err', 'Error: ' + err.message);
      dropZone.style.display = '';
    }
  };
  reader.onerror = function(){ setStatus('err', 'Could not read file.'); dropZone.style.display = ''; };
  reader.readAsArrayBuffer(file);
}

function renderResults(){
  uploadSection.style.display = 'none';
  resultsSection.style.display = 'block';
  statusBar.classList.remove('visible');

  cciList.innerHTML = '';
  allData.ccis.forEach(function(c){
    var sl = c.status.toLowerCase();
    var el = document.createElement('span');
    el.className = 'cci-entry';
    el.innerHTML = '<span class="cci-name">' + fmtName(c.name) + '</span>' +
      '<span class="' + (sl === 'in' ? 'cci-in' : 'cci-out') + '">' + c.status.toUpperCase() + ' ' + (sl === 'in' ? '✓' : '✕') + '</span>';
    cciList.appendChild(el);
  });
  cciBar.classList.add('visible');

  tabBar.innerHTML = '';
  var lastName = allData.name.split(' ').pop();
  var tabs = [{id:'flavin', label: lastName, jobs: allData.flavin}];
  allData.contractorSheets.forEach(function(sn){
    var d = allData.sheets[sn];
    if(d) tabs.push({id: sn, label: sn, jobs: d.jobs});
  });

  tabs.forEach(function(t, idx){
    var btn = document.createElement('button');
    btn.className = 'tab' + (idx === 0 ? ' active' : '');
    btn.innerHTML = t.label + '<span class="tab-ct">' + t.jobs.length + '</span>';
    btn.addEventListener('click', function(){
      document.querySelectorAll('.tab').forEach(function(x){ x.classList.remove('active'); });
      btn.classList.add('active');
      if(t.id === 'flavin'){
        renderFlavinJobs(t.jobs);
      } else {
        renderListJobs(t.jobs);
      }
    });
    tabBar.appendChild(btn);
  });

  renderFlavinJobs(allData.flavin);
}

function gv(row, h, name){
  var i = h.indexOf(name);
  if(i === -1 || row[i] == null || row[i] === '') return null;
  return String(row[i]).trim();
}

function badgesHtml(cgf, hp){
  var contText = cgf || 'No';
  var hpText = (hp && hp.toLowerCase() !== 'n') ? hp : 'N/A';
  return '<div class="badges">' +
    '<span class="b-cont">Contingency: ' + contText + '</span>' +
    '<span class="b-hp">Hold Point: ' + hpText + '</span>' +
    '</div>';
}

function renderFlavinJobs(jobs){
  resultsHdr.style.display = 'flex';
  resultsCount.textContent = jobs.length + ' job' + (jobs.length !== 1 ? 's' : '');
  jobsContainer.innerHTML = '';

  if(!jobs || jobs.length === 0){
    jobsContainer.innerHTML = '<div class="no-jobs">No jobs assigned</div>';
    return;
  }

  var h = allData.headers;
  var grid = document.createElement('div');
  grid.className = 'jobs';

  jobs.forEach(function(row){
    var loc = gv(row,h,'Location') || '—';
    var tw  = gv(row,h,'Type Of Work') || '';
    var wd  = gv(row,h,'Work Description');
    var tk  = gv(row,h,'Ticket #');
    var wo  = gv(row,h,'Layout/CWORX Work Order #');
    var fm  = gv(row,h,"Contractor's Foreman");
    var ph  = gv(row,h,'Permit Hours');
    var psc = gv(row,h,'PSC File #');
    var cci = gv(row,h,'CCI');
    var jo  = gv(row,h,'Job Owner');
    var cg  = gv(row,h,'Contingency (Y/N)');
    var cn  = gv(row,h,'Contingency #');
    var hp  = gv(row,h,'Hold Point');
    var c7  = gv(row,h,'Code 753');
    var co  = row._co || '';
    var twl = tw.toLowerCase();
    var bc  = twl.indexOf('major') !== -1 ? 'tbadge t-major' : twl.indexOf('new') !== -1 ? 'tbadge t-new' : 'tbadge t-mrp';
    var cgf = (cg && cg.toLowerCase() !== 'no') ? (cg + (cn ? ' · ' + cn : '')) : null;

    var card = document.createElement('div');
    card.className = 'job-card';
    card.innerHTML =
      '<div class="card-head"><div class="loc">' + loc + '</div>' + (tw ? '<span class="' + bc + '">' + tw + '</span>' : '') + '</div>' +
      '<div class="card-primary">' +
        '<div class="pf"><span class="fl">Ticket #</span><span class="fv' + (tk ? '' : ' mt') + '">' + (tk||'N/A') + '</span></div>' +
        '<div class="pf"><span class="fl">Contingency</span><span class="fv pl' + (cgf ? '' : ' mt') + '">' + (cgf||'No') + '</span></div>' +
      '</div>' +
      '<div class="card-foreman">' + (co ? '<div class="co-tag">' + co + '</div>' : '') + '<div class="fm-name' + (fm ? '' : ' mt') + '">' + (fm||'N/A') + '</div></div>' +
      '<div class="card-fields">' +
        '<div class="cf"><span class="fl">Work</span><span class="cfv pl' + (wd?'':' mt') + '">' + (wd||'N/A') + '</span></div>' +
        '<div class="cf"><span class="fl">Work order</span><span class="cfv' + (wo?'':' mt') + '">' + (wo||'N/A') + '</span></div>' +
        '<div class="cf"><span class="fl">Permit hours</span><span class="cfv' + (ph?'':' mt') + '">' + (ph||'N/A') + '</span></div>' +
        '<div class="cf"><span class="fl">PSC file</span><span class="cfv pl' + (psc?'':' mt') + '">' + (psc||'N/A') + '</span></div>' +
        '<div class="cf"><span class="fl">CCI</span><span class="cfv pl' + (cci?'':' mt') + '">' + (cci||'N/A') + '</span></div>' +
        '<div class="cf"><span class="fl">Job owner</span><span class="cfv pl' + (jo?'':' mt') + '">' + (jo||'N/A') + '</span></div>' +
        '<div class="cf"><span class="fl">Code 753</span><span class="cfv' + (c7?'':' mt') + '">' + (c7||'N/A') + '</span></div>' +
      '</div>' +
      badgesHtml(cgf, hp);

    grid.appendChild(card);
  });

  jobsContainer.appendChild(grid);
}

function renderListJobs(jobs){
  resultsHdr.style.display = 'none';
  jobsContainer.innerHTML = '';

  if(!jobs || jobs.length === 0){
    jobsContainer.innerHTML = '<div class="no-jobs">No jobs assigned</div>';
    return;
  }

  var h = allData.headers;
  var list = document.createElement('div');
  list.className = 'list-jobs';

  jobs.forEach(function(row){
    var loc = gv(row,h,'Location') || '—';
    var wd  = gv(row,h,'Work Description');
    var tk  = gv(row,h,'Ticket #');
    var fm  = gv(row,h,"Contractor's Foreman");
    var ph  = gv(row,h,'Permit Hours');
    var cg  = gv(row,h,'Contingency (Y/N)');
    var cn  = gv(row,h,'Contingency #');
    var hp  = gv(row,h,'Hold Point');
    var cgf = (cg && cg.toLowerCase() !== 'no') ? (cg + (cn ? ' · ' + cn : '')) : null;
    var hpText = (hp && hp.toLowerCase() !== 'n') ? hp : 'N/A';

    var fmShort = '';
    if(fm){
      var parts = fm.replace(/^\d+-\s*/, '').split(' ');
      fmShort = parts.slice(0, 2).join(' ');
    }

    var item = document.createElement('div');
    item.className = 'list-item';
    item.innerHTML =
      '<div class="list-loc">' + loc + '</div>' +
      '<div class="list-work">' + (wd||'—') + '</div>' +
      '<div class="list-meta">' +
        (tk ? '<span class="lm">Ticket <b>' + tk + '</b></span>' : '') +
        (fmShort ? '<span class="lm">Foreman <b>' + fmShort + '</b></span>' : '') +
        (ph ? '<span class="lm">Hours <b>' + ph + '</b></span>' : '') +
      '</div>' +
      '<div class="list-badges">' +
        '<span class="b-cont">Contingency: ' + (cgf||'No') + '</span>' +
        '<span class="b-hp">Hold Point: ' + hpText + '</span>' +
      '</div>';

    list.appendChild(item);
  });

  jobsContainer.appendChild(list);
}

})();
</script>
</body>
</html>
